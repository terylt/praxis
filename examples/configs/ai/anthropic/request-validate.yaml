# Validates Anthropic Messages JSON envelopes before forwarding
#
# Rejects empty, malformed, or non-object JSON request bodies.
# Anthropic API semantics such as required fields and parameter
# ranges are left to the inference backend.

listeners:
  - name: anthropic-gateway
    address: "127.0.0.1:8080"
    filter_chains: [anthropic-validate]

filter_chains:
  - name: anthropic-validate
    filters:
      # anthropic_messages_format wraps the shared AI classifier and applies
      # /v1/messages plus anthropic-version disambiguation before validation.
      - filter: anthropic_messages_format
        on_invalid: reject

      - filter: anthropic_validate
        max_body_bytes: 1048576

      - filter: router
        routes:
          - path: "/v1/messages"
            cluster: "anthropic-backend"

      - filter: load_balancer
        clusters:
          - name: "anthropic-backend"
            endpoints:
              - "127.0.0.1:3001"

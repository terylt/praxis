# NOTE: Currently disabled pending infrastructure

name: Automated Review

# ------------------------------------------------------------------------------
# Workflow Settings
# ------------------------------------------------------------------------------

on:
  # TODO: enable after infra setup is complete
  # pull_request_target:
  #   branches: [main]
  #   types: [opened, ready_for_review]
  # schedule:
  #   - cron: "23 */4 * * *"
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review (blank = all unreviewed)"
        required: false
        type: string
        default: ""
      model:
        description: "Model override (e.g. claude-opus-4-6)"
        required: false
        type: string
        default: ""

permissions: {}

jobs:
  # ----------------------------------------------------------------------------
  # Discover PRs to Review
  # ----------------------------------------------------------------------------

  discover:
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: read
    outputs:
      matrix: ${{ steps.find.outputs.matrix }}
      count: ${{ steps.find.outputs.count }}
    steps:
      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.PRAXIS_BOT_APP_ID }}
          private-key: ${{ secrets.PRAXIS_BOT_APP_PRIVATE_KEY }}

      - name: Find PRs to review
        id: find
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
          EVENT_PR_DRAFT: ${{ github.event.pull_request.draft }}
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          set -euo pipefail

          bot_login=$(gh api user --jq '.login')

          # ── PR event: review the triggering PR ──
          if [[ "$EVENT_NAME" == "pull_request_target" ]]; then
            if [[ "$EVENT_PR_DRAFT" == "true" ]]; then
              echo "Skipping draft PR #${EVENT_PR_NUMBER}"
              echo "matrix=[]" >> "$GITHUB_OUTPUT"
              echo "count=0" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            labels=$(gh pr view "$EVENT_PR_NUMBER" --repo "$GH_REPO" \
              --json labels --jq '.labels[].name')
            if echo "$labels" | grep -q '^skip/automated-review$'; then
              echo "Skipping PR #${EVENT_PR_NUMBER} (skip label)"
              echo "matrix=[]" >> "$GITHUB_OUTPUT"
              echo "count=0" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "matrix=[\"${EVENT_PR_NUMBER}\"]" >> "$GITHUB_OUTPUT"
            echo "count=1" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # ── Manual dispatch with specific PR ──
          if [[ "$EVENT_NAME" == "workflow_dispatch" && -n "$INPUT_PR_NUMBER" ]]; then
            if ! [[ "$INPUT_PR_NUMBER" =~ ^[0-9]+$ ]]; then
              echo "::error::pr_number must be a positive integer"
              exit 1
            fi
            echo "matrix=[\"${INPUT_PR_NUMBER}\"]" >> "$GITHUB_OUTPUT"
            echo "count=1" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # ── Schedule or dispatch without PR: discover unreviewed ──
          prs=$(gh pr list --repo "$GH_REPO" --base main --state open \
            --json number,isDraft,labels \
            --jq '[.[] | select(.isDraft == false) |
              select(.labels | map(.name) |
                any(. == "skip/automated-review") | not)
            ] | .[].number')

          unreviewed=()
          for pr in $prs; do
            count=$(gh api "repos/${GH_REPO}/pulls/${pr}/reviews" \
              --jq "[.[] | select(
                .user.login == \"${bot_login}\" or
                .user.login == \"praxis-bot\"
              )] | length")
            if [[ "$count" -eq 0 ]]; then
              unreviewed+=("\"${pr}\"")
            fi
          done

          if [[ ${#unreviewed[@]} -eq 0 ]]; then
            echo "No unreviewed PRs found"
            echo "matrix=[]" >> "$GITHUB_OUTPUT"
            echo "count=0" >> "$GITHUB_OUTPUT"
          else
            matrix="[$(IFS=,; echo "${unreviewed[*]}")]"
            echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"
            echo "count=${#unreviewed[@]}" >> "$GITHUB_OUTPUT"
            echo "Found ${#unreviewed[@]} unreviewed PR(s)"
          fi

  # ----------------------------------------------------------------------------
  # Review
  # ----------------------------------------------------------------------------

  review:
    needs: discover
    if: needs.discover.outputs.count != '0'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    strategy:
      matrix:
        pr: ${{ fromJSON(needs.discover.outputs.matrix) }}
      fail-fast: false
      max-parallel: 3
    concurrency:
      group: automated-review-${{ matrix.pr }}
      cancel-in-progress: true
    steps:
      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.PRAXIS_BOT_APP_ID }}
          private-key: ${{ secrets.PRAXIS_BOT_APP_PRIVATE_KEY }}

      - name: Authenticate with GCP
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Checkout base branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.repository.default_branch || 'main' }}

      - name: Review PR
        uses: anthropics/claude-code-action@12531344451323133b0493233c759991ac61da12 # v1.0.174
        with:
          use_vertex: "true"
          github_token: ${{ steps.app-token.outputs.token }}
          prompt: |
            You are reviewing PR #${{ matrix.pr }} in this repository.
            Read the file .github/prompts/automated-review.md for your
            detailed review instructions, then execute them.
          claude_args: >-
            --model ${{ inputs.model || 'claude-sonnet-4-6' }}
            --allowedTools
            "Read"
            "Bash(gh pr view *)"
            "Bash(gh pr diff *)"
            "Bash(gh api *)"
            "Bash(gh repo view *)"
            --dangerously-skip-permissions
            --max-budget-usd 5
        env:
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ matrix.pr }}
          CLOUD_ML_REGION: ${{ vars.CLOUD_ML_REGION }}
          ANTHROPIC_VERTEX_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          DISABLE_PROMPT_CACHING: "1"

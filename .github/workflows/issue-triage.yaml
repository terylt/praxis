name: Issue Triage

# ------------------------------------------------------------------------------
# Workflow Settings
# ------------------------------------------------------------------------------

on:
  issues:
    types: [opened, milestoned, demilestoned]

permissions: {}

jobs:
  # ----------------------------------------------------------------------------
  # Triage Labels
  # ----------------------------------------------------------------------------

  triage:
    if: ${{ !github.event.issue.pull_request }}
    runs-on: ubuntu-24.04
    permissions:
      issues: write
    steps:
      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.PRAXIS_BOT_APP_ID }}
          private-key: ${{ secrets.PRAXIS_BOT_APP_PRIVATE_KEY }}

      - name: Add triage/needs-triage on new issue
        if: github.event.action == 'opened' && !github.event.issue.milestone
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
          ISSUE: ${{ github.event.issue.number }}
        run: |
          gh issue edit "$ISSUE" --repo "$GH_REPO" \
            --add-label "triage/needs-triage"

      - name: Accept triaged issue
        if: github.event.action == 'milestoned'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
          ISSUE: ${{ github.event.issue.number }}
        run: |
          gh issue edit "$ISSUE" --repo "$GH_REPO" \
            --remove-label "triage/needs-triage" \
            --add-label "triage/accepted"

      - name: Revert to needs-triage on demilestone
        if: github.event.action == 'demilestoned'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
          ISSUE: ${{ github.event.issue.number }}
        run: |
          gh issue edit "$ISSUE" --repo "$GH_REPO" \
            --remove-label "triage/accepted" \
            --add-label "triage/needs-triage"
